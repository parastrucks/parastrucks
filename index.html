    <!-- viewport-fit=cover lets the page paint into iOS notch/home-bar areas
         so `env(safe-area-inset-*)` resolves to real device insets instead
         of 0. The CSS that reads those insets (.bottom-nav, .app-main) keeps
         the content clear of the home indicator. -->

    <meta name="robots" content="noindex, nofollow" />

  </head>
