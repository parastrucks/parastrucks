<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Paras Trucks</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<meta name="theme-color" content="#0080C9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0A1628 0%,#0D2844 40%,#0B4F7A 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;color:#fff}
.logo{margin-bottom:40px}.logo img{height:56px;filter:brightness(0) invert(1)}
.code{font-size:clamp(80px,15vw,140px);font-weight:800;letter-spacing:-4px;color:rgba(255,255,255,0.08);line-height:1;margin-bottom:-20px;position:relative;z-index:0}
.message{position:relative;z-index:1}
h1{font-size:clamp(22px,4vw,32px);font-weight:800;margin-bottom:12px;letter-spacing:-0.5px}
p{font-size:16px;color:rgba(255,255,255,0.5);max-width:440px;margin:0 auto 32px;line-height:1.7}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:14px 28px;border-radius:8px;font-size:15px;font-weight:700;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#fff;color:#0080C9}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.btn-outline{background:transparent;border:2px solid rgba(255,255,255,0.25);color:#fff}.btn-outline:hover{border-color:#fff;background:rgba(255,255,255,0.1)}
a{text-decoration:none;color:inherit}
</style>
</head>
<body>
<a href="/" class="logo"><img src="/images/paras-logo.png" alt="Paras Trucks"></a>
<div class="code">404</div>
<div class="message">
<h1>Page not found</h1>
<p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
<div class="actions">
<a href="/" class="btn btn-primary">&#8592; Back to Homepage</a>
<a href="/contact.html" class="btn btn-outline">Contact Us</a>
</div>
</div>
</body>
</html>
